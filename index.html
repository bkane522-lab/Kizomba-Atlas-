<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0820">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KizRadar">
<link rel="manifest" href="/manifest.json">
<title>KizRadar — Never Miss The Night</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root {
  --bg:       #0d0820;
  --bg2:      #160d30;
  --bg3:      #1e1040;
  --gold:     #ffd166;
  --gold2:    #f4a329;
  --purple:   #7c3aed;
  --accent:   #c084fc;
  --warm:     #ff9a5c;
  --teal:     #06d6a0;
  --red:      #ff4d6d;
  --white:    #f5eeff;
  --gray:     #8b7aaa;
  --card:     rgba(30,16,64,0.75);
  --border:   rgba(255,209,102,0.15);
  --border2:  rgba(192,132,252,0.25);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg); color: var(--white);
  font-family:'Space Grotesk',sans-serif;
  height:100vh; overflow:hidden;
}
.serif { font-family:'Playfair Display',serif; }

/* ═══ SPLASH ═══ */
#splash {
  position:fixed; inset:0; z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(124,58,237,.25), var(--bg) 70%);
  padding:2rem; text-align:center; gap:1.25rem;
}
.splash-logo { animation: float 5s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
.splash-claim { font-size:clamp(1rem,4vw,1.3rem); color:var(--white); line-height:1.5; max-width:300px; }
.splash-claim em { color:var(--warm); font-style:normal; }
.splash-sub { font-size:.8rem; color:var(--gray); letter-spacing:.05em; }
.enter-btn {
  margin-top:.5rem; padding:1rem 2.5rem; border:none; border-radius:50px;
  background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#1a0030;
  font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1rem;
  cursor:pointer; box-shadow:0 0 40px rgba(255,209,102,.3); transition:all .3s;
}
.enter-btn:hover { transform:scale(1.04); }

/* ═══ MAP ═══ */
#map { position:fixed; inset:0; z-index:1; background:var(--bg); }
.leaflet-tile-pane { filter: invert(1) hue-rotate(200deg) saturate(0.8) brightness(0.9) contrast(1.1); }
.leaflet-control-attribution { background:rgba(13,8,32,.7) !important; color:var(--gray) !important; font-size:.6rem !important; }
.leaflet-control-attribution a { color:var(--accent) !important; }
.leaflet-control-zoom { display:none; }

/* Custom marker */
.kiz-marker {
  width:38px; height:38px; border-radius:50%;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; box-shadow:0 0 20px rgba(255,209,102,.6), 0 2px 8px rgba(0,0,0,.4);
  border:2px solid rgba(255,255,255,.3);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{ box-shadow:0 0 20px rgba(255,209,102,.6), 0 2px 8px rgba(0,0,0,.4);} 50%{ box-shadow:0 0 32px rgba(255,209,102,.85), 0 2px 8px rgba(0,0,0,.4);} }

/* ═══ TOP BAR ═══ */
.top-bar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  padding:1rem 1.1rem .75rem;
  background:linear-gradient(180deg, var(--bg) 40%, transparent);
  display:flex; align-items:center; justify-content:space-between;
}
.top-logo { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:900; }
.top-logo .kiz{color:var(--gold);} .top-logo .radar{color:var(--accent);}
.locate-btn {
  width:40px; height:40px; border-radius:50%;
  background:var(--card); border:1px solid var(--border);
  color:var(--white); font-size:1.1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(10px);
}

/* ═══ FILTER PILLS ═══ */
.filter-row {
  position:fixed; top:64px; left:0; right:0; z-index:50;
  display:flex; gap:.5rem; padding:0 1.1rem; overflow-x:auto; scrollbar-width:none;
}
.filter-pill {
  flex-shrink:0; padding:.5rem 1rem; border-radius:20px;
  background:var(--card); border:1px solid var(--border);
  color:var(--gray); font-size:.8rem; font-weight:600; cursor:pointer;
  backdrop-filter:blur(10px); transition:all .2s; white-space:nowrap;
}
.filter-pill.active { background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#1a0030; border-color:transparent; }

/* ═══ FAB add event ═══ */
.fab-add {
  position:fixed; bottom:100px; right:1.1rem; z-index:50;
  width:56px; height:56px; border-radius:50%; border:none;
  background:linear-gradient(135deg,var(--purple),var(--accent));
  color:#fff; font-size:1.6rem; cursor:pointer;
  box-shadow:0 6px 24px rgba(124,58,237,.5);
  display:flex; align-items:center; justify-content:center;
}

/* ═══ BOTTOM SHEET (event detail) ═══ */
.sheet-overlay {
  position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.5);
  opacity:0; pointer-events:none; transition:opacity .3s;
}
.sheet-overlay.open { opacity:1; pointer-events:all; }
.sheet {
  position:fixed; left:0; right:0; bottom:0; z-index:101;
  background:linear-gradient(180deg,var(--bg2),var(--bg));
  border-radius:24px 24px 0 0; border-top:1px solid var(--border2);
  padding:1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom));
  transform:translateY(100%); transition:transform .35s cubic-bezier(.32,.72,0,1);
  max-height:75vh; overflow-y:auto;
}
.sheet.open { transform:translateY(0); }
.sheet-handle { width:40px; height:4px; border-radius:2px; background:var(--border2); margin:0 auto 1rem; }
.sheet-close {
  position:absolute; top:1.2rem; right:1.2rem; width:32px; height:32px;
  border-radius:50%; background:var(--card); border:1px solid var(--border);
  color:var(--white); font-size:1rem; cursor:pointer;
}
.sheet-style-tag {
  display:inline-block; font-size:.68rem; text-transform:uppercase; letter-spacing:.08em;
  padding:.3rem .7rem; border-radius:16px; background:rgba(124,58,237,.2);
  color:var(--accent); border:1px solid rgba(124,58,237,.35); margin-bottom:.7rem;
}
.sheet-title { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:900; color:var(--gold); margin-bottom:.3rem; }
.sheet-meta { display:flex; flex-direction:column; gap:.55rem; margin:1rem 0; }
.sheet-meta-row { display:flex; align-items:center; gap:.6rem; font-size:.88rem; color:var(--white); }
.sheet-meta-icon { font-size:1.1rem; width:24px; text-align:center; }
.sheet-desc { font-size:.85rem; color:var(--gray); line-height:1.6; margin-bottom:1.2rem; }
.going-row { display:flex; align-items:center; gap:.6rem; margin-bottom:1rem; }
.going-count { font-size:.82rem; color:var(--gray); }
.going-count strong { color:var(--gold); }
.im-going-btn {
  width:100%; padding:1rem; border:none; border-radius:16px;
  background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#1a0030;
  font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:.95rem; cursor:pointer;
  transition:all .2s;
}
.im-going-btn.going { background:linear-gradient(135deg,var(--teal),#0fe0b0); }
.im-going-btn:hover { transform:translateY(-1px); }
.im-going-btn:disabled { opacity:.6; cursor:default; transform:none; }
.detail-actions { display:flex; gap:.6rem; margin-top:.7rem; }
.detail-action {
  flex:1; padding:.8rem; border-radius:14px;
  background:var(--card); border:1px solid var(--border2); color:var(--white);
  font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:.85rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:.4rem;
}
.detail-action:active { border-color:var(--accent); }

/* ═══ LIST SHEET ═══ */
.list-item {
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:.9rem 1rem; cursor:pointer; display:flex; flex-direction:column; gap:.35rem;
  transition:border-color .2s;
}
.list-item:active { border-color:var(--gold); }
.list-item-top { display:flex; justify-content:space-between; align-items:baseline; gap:.5rem; }
.list-item-title { font-family:'Playfair Display',serif; font-weight:700; color:var(--gold); font-size:1rem; }
.list-item-style { font-size:.64rem; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); flex-shrink:0; white-space:nowrap; }
.list-item-meta { font-size:.76rem; color:var(--gray); display:flex; gap:.9rem; flex-wrap:wrap; }
.list-empty { text-align:center; color:var(--gray); font-size:.85rem; line-height:1.7; padding:2.5rem 1rem; }

/* ═══ ADD EVENT FORM SHEET ═══ */
.form-lbl { font-size:.75rem; color:var(--gray); display:block; margin:.9rem 0 .35rem; }
.form-lbl:first-of-type { margin-top:0; }
.form-input, .form-select, .form-textarea {
  width:100%; background:rgba(10,5,25,.6); border:1px solid var(--border);
  border-radius:12px; padding:.75rem .9rem; color:var(--white);
  font-family:'Space Grotesk',sans-serif; font-size:.88rem; outline:none;
  transition:border-color .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--accent); }
.form-select option { background:var(--bg2); }
.style-chips { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.4rem; }
.style-chip-select {
  padding:.5rem .9rem; border-radius:18px; font-size:.78rem; cursor:pointer;
  background:var(--card); border:1px solid var(--border); color:var(--gray); transition:all .2s;
}
.style-chip-select.selected { background:rgba(255,209,102,.15); border-color:var(--gold); color:var(--gold); }
.submit-event-btn {
  width:100%; margin-top:1.3rem; padding:1rem; border:none; border-radius:16px;
  background:linear-gradient(135deg,var(--purple),var(--accent)); color:#fff;
  font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:.95rem; cursor:pointer;
}
.submit-event-btn:disabled { opacity:.65; cursor:default; }

/* ═══ BOTTOM NAV ═══ */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  display:flex; justify-content:space-around; align-items:center;
  padding:.7rem 0 calc(.7rem + env(safe-area-inset-bottom));
  background:rgba(13,8,32,.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
}
.nav-i {
  display:flex; flex-direction:column; align-items:center; gap:.18rem;
  background:none; border:1px solid transparent; border-radius:12px;
  padding:.35rem .9rem; color:var(--gray); font-size:.62rem;
  font-family:'Space Grotesk',sans-serif; cursor:pointer;
}
.nav-i .ic { font-size:1.25rem; }
.nav-i.active { color:var(--gold); background:rgba(255,209,102,.07); border-color:rgba(255,209,102,.15); }

/* ═══ TOAST ═══ */
.toast {
  position:fixed; top:75px; left:50%; transform:translateX(-50%) translateY(-130px);
  background:linear-gradient(135deg,var(--bg3),rgba(255,209,102,.1));
  border:1px solid var(--gold); border-radius:20px; padding:.85rem 1.2rem;
  z-index:9999; display:flex; align-items:center; gap:.6rem;
  backdrop-filter:blur(20px); transition:transform .5s cubic-bezier(.34,1.56,.64,1);
  font-size:.85rem; max-width:88vw;
}
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══════════════ SPLASH ═══════════════ -->
<div id="splash">
  <div class="splash-logo">
    <svg width="260" height="140" viewBox="0 0 260 140" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f4a329"/><stop offset="100%" stop-color="#ffd166"/>
        </linearGradient>
        <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
      </defs>
      <circle cx="130" cy="55" r="42" fill="none" stroke="url(#g2)" stroke-width="1.2" opacity=".4"/>
      <circle cx="130" cy="55" r="30" fill="none" stroke="url(#g1)" stroke-width="1" opacity=".3"/>
      <circle cx="130" cy="55" r="5" fill="url(#g1)"/>
      <circle cx="95" cy="35" r="3" fill="#ffd166" opacity=".8"/>

<script>
// ════════════════════════════════════════════════
// UTILITAIRES
// ════════════════════════════════════════════════
function todayISO(offset = 0){
  const d = new Date(); d.setDate(d.getDate() + offset);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

const STYLE_EMOJI = { Kizomba:'🎵', 'Urban Kiz':'💃', Semba:'🔥', Tarraxo:'🌊', SBK:'✨' };

// Fetch robuste : timeout, JSON invalide, réponse vide, erreur réseau
async function fetchJSON(url, options = {}, timeoutMs = 10000){
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(url, { ...options, signal: ctrl.signal });
    const text = await res.text();
    let data = null;
    if(text){ try { data = JSON.parse(text); } catch(_) { data = null; } }
    if(!res.ok){
      throw new Error((data && data.error) ? data.error : `Erreur ${res.status}`);
    }
    return data;
  } finally {
    clearTimeout(timer);
  }
}

function errMsg(e, fallback){
  if(e && e.name === 'AbortError') return 'Délai dépassé — vérifie ta connexion';
  if(e && e.message) return e.message;
  return fallback || 'Une erreur est survenue';
}

// "J'y vais" : mémorisé par appareil pour éviter de compter deux fois
let goingIds = JSON.parse(localStorage.getItem('kizradar_going') || '[]');
function saveGoing(){ localStorage.setItem('kizradar_going', JSON.stringify(goingIds)); }

// ════════════════════════════════════════════════
// DONNÉES (backend partagé /api/events)
// ════════════════════════════════════════════════
let events = [];

async function loadEvents(){
  try {
    const j = await fetchJSON('/api/events', {}, 10000);
    events = (j && Array.isArray(j.events)) ? j.events : [];
  } catch (e) {
    events = [];
    showToast('⚠️', errMsg(e, 'Chargement impossible'));
  }
}

// ══════════════════════════════════════════
